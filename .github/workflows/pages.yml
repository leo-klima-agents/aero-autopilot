name: pages

# Build the static simulator and deploy to GitHub Pages on every push to main.
# The site is public even while the repo is private (plan §2 stack note) — the
# secret scan gates every deploy, and shipped strategy configs are treated as
# public. PR checklist item: confirm the deploy contains no private alpha.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: build site
        run: pnpm --filter @aero-poc/web build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
      # P7 release gate: no secret-shaped content ships, ever.
      - name: secret-scan the bundle
        run: node scripts/scan-bundle-for-secrets.mjs apps/web/dist
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
