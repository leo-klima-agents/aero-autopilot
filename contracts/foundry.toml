# Compiler settings are frozen per release tag: Basescan verification fails on
# any mismatch (OPERATIONS.md §6), so bump these deliberately, never casually.
[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
bytecode_hash = "ipfs"
fs_permissions = [
    { access = "read", path = "./test/differential/fixtures" },
    { access = "read", path = "./facets.json" },
]
# The vendored EIP-2535 reference (src/Diamond.sol, libraries/LibDiamond.sol,
# facets/DiamondCut/LoupeFacet.sol) is the ONLY sanctioned assembly (P5).

[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs = 64
depth = 32
fail_on_revert = false

[profile.ci.fuzz]
runs = 1024

[profile.ci.invariant]
runs = 256
depth = 64

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
base = "${BASE_RPC_URL}"
